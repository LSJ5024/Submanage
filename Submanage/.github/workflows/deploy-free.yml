name: 무료 스택 배포 (Vercel + Render)

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  # ── 1. CI ────────────────────────────────────────────────────────────────
  ci:
    name: CI (lint + typecheck)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v3
        with: { version: 9 }
      - uses: actions/setup-node@v4
        with: { node-version: '20', cache: 'pnpm' }
      - run: pnpm install --frozen-lockfile
      - run: pnpm lint
      - run: pnpm typecheck

  # ── 2. DB 마이그레이션 (Neon) ────────────────────────────────────────────
  db-migrate:
    name: DB 마이그레이션 (Neon PostgreSQL)
    runs-on: ubuntu-latest
    needs: ci
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v3
        with: { version: 9 }
      - uses: actions/setup-node@v4
        with: { node-version: '20', cache: 'pnpm' }
      - run: pnpm install --frozen-lockfile
      - name: Prisma 마이그레이션
        working-directory: services/api
        run: pnpm db:migrate:deploy
        env:
          DATABASE_URL: ${{ secrets.NEON_DATABASE_URL }}

  # ── 3. Web 배포 (Vercel) ─────────────────────────────────────────────────
  deploy-web:
    name: Web 배포 (Vercel)
    runs-on: ubuntu-latest
    needs: ci
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v3
        with: { version: 9 }
      - uses: actions/setup-node@v4
        with: { node-version: '20', cache: 'pnpm' }
      - run: pnpm install --frozen-lockfile
      - name: Vercel 배포
        run: npx vercel --prod --token=${{ secrets.VERCEL_TOKEN }} --yes
        env:
          VERCEL_ORG_ID:     ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
          VITE_API_BASE_URL: ${{ secrets.RENDER_API_URL }}/api/v1
          VITE_DEMO_MODE:    'false'

  # ── 4. API 배포 (Render — 자동 배포 설정 후 webhook 트리거) ──────────────
  deploy-api:
    name: API 배포 트리거 (Render)
    runs-on: ubuntu-latest
    needs: db-migrate
    steps:
      - name: Render 배포 훅 호출
        run: |
          curl -X POST "${{ secrets.RENDER_API_DEPLOY_HOOK }}" \
               -H "Accept: application/json"

  # ── 5. 헬스 체크 ─────────────────────────────────────────────────────────
  health-check:
    name: 배포 후 헬스 체크
    runs-on: ubuntu-latest
    needs: [deploy-web, deploy-api]
    steps:
      - name: API 헬스 체크 (Render 워밍업 포함)
        run: |
          echo "⏳ Render 서비스 워밍업 대기 (최대 60초)..."
          for i in $(seq 1 8); do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
              "${{ secrets.RENDER_API_URL }}/health" || echo "000")
            if [ "$STATUS" = "200" ]; then
              echo "✅ API 정상 (HTTP $STATUS)"
              exit 0
            fi
            echo "⏳ 재시도 $i/8 (STATUS: $STATUS) — 10초 대기..."
            sleep 10
          done
          echo "⚠️ 헬스 체크 타임아웃 (Render 프리 티어 콜드 스타트는 30~60초 소요)"
