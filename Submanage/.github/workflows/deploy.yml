name: Deploy to Production

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      environment:
        description: '배포 환경'
        required: true
        default: 'production'
        type: choice
        options: [production, staging]

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: false  # 배포 중 취소 방지

jobs:
  # ── 1. CI 검증 ─────────────────────────────────────────────────────────
  ci-check:
    name: CI 검증 (lint + test)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v3
        with: { version: 9 }
      - uses: actions/setup-node@v4
        with: { node-version: '20', cache: 'pnpm' }
      - run: pnpm install --frozen-lockfile
      - run: pnpm lint
      - run: pnpm typecheck

  # ── 2. API 서버 Docker 빌드 & ECR 푸시 ─────────────────────────────────
  build-api:
    name: API 서버 빌드
    runs-on: ubuntu-latest
    needs: ci-check
    outputs:
      image-tag: ${{ steps.meta.outputs.tags }}
      image-digest: ${{ steps.build.outputs.digest }}
    steps:
      - uses: actions/checkout@v4

      - name: AWS 자격증명 설정
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region:            ap-northeast-2

      - name: ECR 로그인
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Docker 메타데이터
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ steps.login-ecr.outputs.registry }}/subtrack-api
          tags: |
            type=sha,prefix=,suffix=,format=short
            type=raw,value=latest

      - name: Docker 빌드 & ECR 푸시
        id: build
        uses: docker/build-push-action@v5
        with:
          context:    ./services/api
          file:       ./services/api/Dockerfile.prod
          push:       true
          tags:       ${{ steps.meta.outputs.tags }}
          labels:     ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to:   type=gha,mode=max

  # ── 3. AI 엔진 Docker 빌드 & ECR 푸시 ──────────────────────────────────
  build-ai-engine:
    name: AI 엔진 빌드
    runs-on: ubuntu-latest
    needs: ci-check
    steps:
      - uses: actions/checkout@v4
      - name: AWS 자격증명 설정
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region:            ap-northeast-2
      - name: ECR 로그인
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2
      - uses: docker/build-push-action@v5
        with:
          context: ./services/ai-engine
          push:    true
          tags:    ${{ steps.login-ecr.outputs.registry }}/subtrack-ai-engine:${{ github.sha }}
          cache-from: type=gha
          cache-to:   type=gha,mode=max

  # ── 4. DB 마이그레이션 (TASK-061: Prisma migrate deploy 자동화) ─────────
  db-migrate:
    name: DB 마이그레이션
    runs-on: ubuntu-latest
    needs: [build-api]
    environment: production
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v3
        with: { version: 9 }
      - uses: actions/setup-node@v4
        with: { node-version: '20', cache: 'pnpm' }
      - run: pnpm install --frozen-lockfile

      - name: AWS 자격증명 설정
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region:            ap-northeast-2

      - name: Prisma 마이그레이션 실행
        working-directory: services/api
        run: pnpm db:migrate:deploy
        env:
          DATABASE_URL: ${{ secrets.PROD_DATABASE_URL }}

  # ── 5. ECS Blue/Green 배포 (TASK-061) ──────────────────────────────────
  deploy-api:
    name: API 서버 배포 (Blue/Green)
    runs-on: ubuntu-latest
    needs: [build-api, db-migrate]
    environment: production
    steps:
      - uses: actions/checkout@v4

      - name: AWS 자격증명 설정
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region:            ap-northeast-2

      - name: ECR 로그인
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: ECS 태스크 정의 업데이트
        id: task-def
        uses: aws-actions/amazon-ecs-render-task-definition@v1
        with:
          task-definition: .github/ecs/api-task-definition.json
          container-name:  api
          image:           ${{ steps.login-ecr.outputs.registry }}/subtrack-api:${{ github.sha }}

      - name: ECS 서비스 배포 (Rolling Update)
        uses: aws-actions/amazon-ecs-deploy-task-definition@v1
        with:
          task-definition:      ${{ steps.task-def.outputs.task-definition }}
          service:              subtrack-api
          cluster:              subtrack-prod
          wait-for-service-stability: true

  # ── 6. Web 앱 빌드 & S3 배포 + CloudFront 무효화 ───────────────────────
  deploy-web:
    name: Web 앱 배포
    runs-on: ubuntu-latest
    needs: ci-check
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v3
        with: { version: 9 }
      - uses: actions/setup-node@v4
        with: { node-version: '20', cache: 'pnpm' }
      - run: pnpm install --frozen-lockfile

      - name: Web 앱 빌드
        working-directory: apps/web
        run: pnpm build
        env:
          VITE_API_BASE_URL: https://api.subtrack.app/api/v1
          VITE_DEMO_MODE:    'false'

      - name: AWS 자격증명 설정
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region:            ap-northeast-2

      - name: S3 업로드
        run: |
          aws s3 sync apps/web/dist/ s3://${{ secrets.WEB_S3_BUCKET }}/ \
            --delete \
            --cache-control "public, max-age=31536000, immutable" \
            --exclude "index.html"
          # index.html은 캐시 없음 (항상 최신 버전)
          aws s3 cp apps/web/dist/index.html s3://${{ secrets.WEB_S3_BUCKET }}/index.html \
            --cache-control "no-cache, no-store, must-revalidate"

      - name: CloudFront 캐시 무효화
        run: |
          aws cloudfront create-invalidation \
            --distribution-id ${{ secrets.CLOUDFRONT_DISTRIBUTION_ID }} \
            --paths "/*"

  # ── 7. 배포 후 헬스 체크 ────────────────────────────────────────────────
  post-deploy:
    name: 배포 후 헬스 체크
    runs-on: ubuntu-latest
    needs: [deploy-api, deploy-web]
    steps:
      - name: API 헬스 체크
        run: |
          for i in 1 2 3 4 5; do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" https://api.subtrack.app/health)
            if [ "$STATUS" = "200" ]; then
              echo "✅ API 헬스 체크 성공"
              exit 0
            fi
            echo "⏳ 재시도 $i/5 (STATUS: $STATUS)"
            sleep 15
          done
          echo "❌ API 헬스 체크 실패"
          exit 1

      - name: 슬랙 배포 알림
        if: always()
        uses: 8398a7/action-slack@v3
        with:
          status: ${{ job.status }}
          text: |
            SubTrack 배포 ${{ job.status == 'success' && '✅ 성공' || '❌ 실패' }}
            커밋: ${{ github.sha }}
            브랜치: ${{ github.ref_name }}
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
