[build]
builder        = "DOCKERFILE"
dockerfilePath = "Dockerfile"

[deploy]
startCommand   = "uvicorn main:app --host 0.0.0.0 --port $PORT"
healthcheckPath    = "/health"
healthcheckTimeout = 30
restartPolicyType  = "ON_FAILURE"
restartPolicyMaxRetries = 3

[[deploy.envVars]]
name  = "PYTHON_ENV"
value = "production"
